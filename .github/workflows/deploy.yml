name: Deploy to GitHub Pages

# Cuándo se ejecuta este workflow
on:
  # Se ejecuta en push a la rama main
  push:
    branches: ["main"]
  
  # Permite ejecutarlo manualmente desde la interfaz de GitHub
  workflow_dispatch:

# Configuración de permisos necesarios
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que se ejecuten múltiples deploys simultáneos
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Construir el sitio
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout
        uses: actions/checkout@v4
      
      # 2. Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # 3. Configurar GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      # 4. Instalar dependencias
      - name: Install dependencies
        run: npm ci
      
      # 5. Verificar tipos TypeScript
      - name: Type check
        run: npm run type-check
      
      # 6. Construir el proyecto
      - name: Build project
        run: npm run build
      
      # 7. Subir los archivos construidos
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # Job 2: Desplegar a GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4